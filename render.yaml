services:
  - type: web
    name: app-tarjetajoven
    runtime: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: /api/v1
    routes:
      - type: rewrite
        source: /api/v1/*
        destination: https://apitj-production.up.railway.app/api/v1/*
      - type: rewrite
        source: /*
        destination: /index.html
